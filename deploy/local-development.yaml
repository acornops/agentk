# Legacy/manual manifest for local development. Prefer the Helm chart in charts/acornops-agentk for release installs.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: acornops-agentk
  namespace: acornops
  labels:
    app: acornops-agentk
spec:
  replicas: 1
  selector:
    matchLabels:
      app: acornops-agentk
  template:
    metadata:
      labels:
        app: acornops-agentk
    spec:
      serviceAccountName: acornops-agentk
      containers:
        - name: agent
          image: acornops/agent:local
          imagePullPolicy: Never
          env:
            - name: ACORNOPS_AGENT_PLATFORM_URL
              value: "ws://host.k3d.internal:3000/agent"
            - name: ACORNOPS_CLUSTER_ID
              value: "cluster-local-456"
            - name: ACORNOPS_AGENT_KEY
              valueFrom:
                secretKeyRef:
                  name: acornops-agentk-secret
                  key: agent-key
            - name: ACORNOPS_AGENT_WRITE_ENABLED
              value: "true"
            - name: ACORNOPS_AGENT_LOG_LEVEL
              value: "debug"
          resources:
            limits:
              cpu: 500m
              memory: 256Mi
            requests:
              cpu: 100m
              memory: 128Mi
